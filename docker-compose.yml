services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: plantrace
      POSTGRES_PASSWORD: plantrace
      POSTGRES_DB: plantrace
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=all
      -c pg_stat_statements.max=10000
    volumes:
      - ./infra/initdb:/docker-entrypoint-initdb.d:ro
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plantrace -d plantrace"]
      interval: 3s
      timeout: 3s
      retries: 20

  redpanda:
    image: redpandadata/redpanda:v25.1.2
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
      - "9644:9644"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 5s
      timeout: 3s
      retries: 20

  kafka-init:
    image: redpandadata/redpanda:v25.1.2
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      rpk topic create query-telemetry --partitions 3 --replicas 1 --brokers redpanda:9092 || true
      rpk topic create collector-heartbeats --partitions 1 --replicas 1 --brokers redpanda:9092 || true
      rpk topic create telemetry-dlq --partitions 1 --replicas 1 --brokers redpanda:9092 || true

  backend:
    build: ./backend
    env_file: .env
    environment:
      KAFKA_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      KAFKA_TOPIC_QUERY_TELEMETRY: query-telemetry
      KAFKA_TOPIC_COLLECTOR_HEARTBEAT: collector-heartbeats
      KAFKA_TOPIC_TELEMETRY_DLQ: telemetry-dlq
    depends_on:
      db:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8201:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app

  collector:
    build: ./collector
    environment:
      COLLECTOR_DSN: postgresql://plantrace:plantrace@db:5432/plantrace
      COLLECTOR_ENVIRONMENT: local
      COLLECTOR_SERVICE_ID: collector-cpp
      COLLECTOR_MIN_MEAN_MS: "0"
      COLLECTOR_EXPLAIN_TIMEOUT_MS: "5000"
      COLLECTOR_STDOUT_MODE: "false"
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      KAFKA_TOPIC_QUERY_TELEMETRY: query-telemetry
    depends_on:
      db:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  frontend:
    build: ./frontend
    ports:
      - "5172:80"
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:11.1.5
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./docs/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

volumes:
  pgdata:
