name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install deps
        run: pip install -r backend/requirements.txt

      - name: Lint (ruff)
        run: cd backend && python -m ruff check app/ tests/

      - name: Unit tests (no Docker required)
        run: cd backend && pytest tests/test_fingerprint.py tests/test_explain_parser.py tests/test_regression_detector.py tests/test_streaming_ingest.py tests/test_consumer_reliability.py tests/test_diagnostics.py tests/test_placement.py tests/test_recommendations.py tests/test_performance_agent.py tests/test_benchmark_runner.py -v

      - name: Regression eval smoke
        run: cd backend && python ../scripts/evaluate_regression_detection.py

      - name: Compose config
        run: |
          cp -n .env.example .env
          docker compose config

      - name: Integration tests (Docker)
        run: cd backend && pytest tests/test_collector.py tests/test_api_smoke.py -v
        env:
          DOCKER_HOST: unix:///var/run/docker.sock

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci
        working-directory: frontend

      - name: TypeScript + build
        run: npm run build
        working-directory: frontend

  collector:
    name: Collector build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config protobuf-compiler libprotobuf-dev libpq-dev librdkafka-dev libssl-dev
          git clone --depth=1 --branch 7.9.2 https://github.com/jtv/libpqxx.git /tmp/libpqxx
          cmake -S /tmp/libpqxx -B /tmp/libpqxx/build -DCMAKE_CXX_STANDARD=20 -DSKIP_BUILD_TEST=ON -DBUILD_SHARED_LIBS=ON
          cmake --build /tmp/libpqxx/build -j$(nproc)
          sudo cmake --install /tmp/libpqxx/build
          sudo ldconfig
      - name: Build collector
        run: |
          cd collector
          cmake -S . -B build
          cmake --build build -j
          ./build/querylens-collector --help
