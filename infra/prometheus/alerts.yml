groups:
  - name: plantrace-alerts
    rules:
      - alert: PlanTraceHighConsumerLag
        expr: max(plantrace_kafka_consumer_lag) > 100
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "PlanTrace consumer lag is high"

      - alert: PlanTracePersistenceFailures
        expr: increase(plantrace_telemetry_persist_failures_total[5m]) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PlanTrace persistence failures detected"

      - alert: PlanTraceDLQEvents
        expr: increase(plantrace_dlq_events_total[5m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "PlanTrace routed events to DLQ"

      - alert: PlanTraceCriticalRegressions
        expr: increase(plantrace_regression_events_total{severity="critical"}[10m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Critical regressions detected"

      - alert: PlanTraceHighApiP95
        expr: histogram_quantile(0.95, sum by (le) (rate(plantrace_api_request_latency_seconds_bucket[5m]))) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PlanTrace API p95 latency is elevated"
